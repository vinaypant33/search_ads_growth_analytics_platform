version: 2

models:
  - name: dim_user
    description: User dimension table summarizing first seen dates, engagement behaviour, funnel activity, and revenue contribution.

    columns:
      - name: user_id
        description: Unique user identifier.
        tests:
          - not_null
          - unique

      - name: first_seen_at
        description: First timestamp when the user appeared in the event stream.
        tests:
          - not_null

      - name: last_seen_at
        description: Last timestamp when the user appeared in the event stream.
        tests:
          - not_null

      - name: first_seen_date
        description: First date when the user appeared.
        tests:
          - not_null

      - name: last_seen_date
        description: Last date when the user appeared.
        tests:
          - not_null

      - name: total_events
        description: Total number of events generated by the user.
        tests:
          - not_null

      - name: total_sessions
        description: Total number of distinct sessions associated with the user.
        tests:
          - not_null

      - name: total_products_interacted
        description: Number of distinct products the user interacted with.

      - name: total_view_events
        description: Number of view events generated by the user.

      - name: total_cart_events
        description: Number of cart events generated by the user.

      - name: total_purchase_events
        description: Number of purchase events generated by the user.

      - name: session_count
        description: Number of session records for the user.

      - name: avg_session_duration_minutes
        description: Average session duration for the user.

      - name: avg_events_per_session
        description: Average events per session for the user.

      - name: has_ever_viewed
        description: Flag showing whether the user has ever viewed a product.
        tests:
          - accepted_values:
              values: [0, 1]

      - name: has_ever_carted
        description: Flag showing whether the user has ever added an item to cart.
        tests:
          - accepted_values:
              values: [0, 1]

      - name: has_ever_purchased
        description: Flag showing whether the user has ever purchased.
        tests:
          - accepted_values:
              values: [0, 1]

      - name: conversion_count
        description: Number of purchase events for the user.

      - name: total_revenue
        description: Total revenue generated by the user.

      - name: avg_purchase_value
        description: Average purchase value for the user.

      - name: user_segment
        description: Behavioural user segment.
        tests:
          - not_null
          - accepted_values:
              values:
                - purchaser
                - carted_not_purchased
                - viewer_only
                - other