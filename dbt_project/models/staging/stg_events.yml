version: 2

sources:
  - name: raw
    database: search_ads_analytics
    schema: raw
    description: Raw source schema containing ingested clickstream events and product master data.
    tables:
      - name: raw_events
        description: Raw e-commerce clickstream events loaded from the original CSV into PostgreSQL.
        columns:
          - name: event_id
            description: Auto-generated event row identifier.
            tests:
              - not_null
              - unique

          - name: event_time
            description: Timestamp of the event in UTC.
            tests:
              - not_null

          - name: event_type
            description: Type of user event in the product funnel.
            tests:
              - not_null
              - accepted_values:
                  values: ['view', 'cart', 'purchase']

          - name: product_id
            description: Product identifier associated with the event.
            tests:
              - not_null

          - name: user_id
            description: User identifier.
            tests:
              - not_null

      - name: product_dim
        description: Product master data synced from MySQL product_master.product_dim into the PostgreSQL raw layer.
        columns:
          - name: product_id
            description: Unique product identifier.
            tests:
              - not_null
              - unique

          - name: category_id
            description: Product category identifier.

          - name: category_code
            description: Product category code. Missing values are standardized as unknown.
            tests:
              - not_null

          - name: brand
            description: Product brand. Missing values are standardized as unknown.
            tests:
              - not_null

          - name: source_system
            description: Source system name for lineage tracking.

          - name: loaded_at
            description: Timestamp when the product record was synced into PostgreSQL.

models:
  - name: stg_events
    description: Cleaned staging model for e-commerce clickstream events. Applies timestamp parsing, event type standardization, date extraction, and basic validity filters.
    columns:
      - name: event_id
        description: Unique event row identifier.
        tests:
          - not_null
          - unique

      - name: event_time
        description: UTC event timestamp.
        tests:
          - not_null

      - name: event_date
        description: Calendar date derived from event_time.
        tests:
          - not_null

      - name: event_hour
        description: Hour of day extracted from event_time.

      - name: event_day_of_week
        description: Day of week extracted from event_time.

      - name: event_month
        description: Month derived from event_time.

      - name: event_type
        description: Standardized event type.
        tests:
          - not_null
          - accepted_values:
              values: ['view', 'cart', 'purchase']

      - name: product_id
        description: Product identifier.
        tests:
          - not_null

      - name: category_id
        description: Category identifier.

      - name: price
        description: Product/event price as numeric value.

      - name: user_id
        description: User identifier.
        tests:
          - not_null

      - name: user_session
        description: Session identifier used for journey/sessionization analysis.