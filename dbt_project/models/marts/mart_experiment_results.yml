version: 2

models:
  - name: mart_experiment_results
    description: Simulated A/B experimentation mart using deterministic user assignment into control and treatment groups. Measures conversion, revenue, engagement, and lift against control.

    columns:
      - name: experiment_name
        description: Name of the simulated experiment.
        tests:
          - not_null

      - name: experiment_variant
        description: Experiment variant assigned to the user group.
        tests:
          - not_null
          - accepted_values:
              values:
                - control
                - treatment

      - name: users
        description: Number of users assigned to the variant.
        tests:
          - not_null

      - name: sessions
        description: Total sessions generated by users in the variant.
        tests:
          - not_null

      - name: sessions_with_cart
        description: Sessions with at least one cart event.

      - name: sessions_with_purchase
        description: Sessions with at least one purchase event.

      - name: purchasers
        description: Number of users with at least one purchase event.

      - name: purchase_events
        description: Total purchase events for the variant.

      - name: total_revenue
        description: Total revenue generated by the variant.
        tests:
          - not_null

      - name: user_conversion_rate
        description: Percentage of assigned users who purchased.

      - name: session_cart_rate
        description: Percentage of sessions with cart activity.

      - name: session_purchase_rate
        description: Percentage of sessions with purchase activity.

      - name: revenue_per_user
        description: Revenue divided by assigned users.

      - name: revenue_per_session
        description: Revenue divided by sessions.

      - name: avg_purchase_value
        description: Average revenue per purchase event.

      - name: avg_session_duration_minutes
        description: Average session duration for users in the variant.

      - name: avg_events_per_session
        description: Average events per session for users in the variant.

      - name: user_conversion_lift_pct
        description: Percentage lift in user conversion rate versus control.

      - name: revenue_per_user_lift_pct
        description: Percentage lift in revenue per user versus control.

      - name: revenue_per_session_lift_pct
        description: Percentage lift in revenue per session versus control.

      - name: avg_purchase_value_lift_pct
        description: Percentage lift in average purchase value versus control.

      - name: session_cart_rate_lift_pct
        description: Percentage lift in session cart rate versus control.

      - name: session_purchase_rate_lift_pct
        description: Percentage lift in session purchase rate versus control.

      - name: experiment_result_status
        description: Interpreted experiment result status.
        tests:
          - not_null
          - accepted_values:
              values:
                - baseline
                - positive_lift
                - negative_lift
                - mixed_result